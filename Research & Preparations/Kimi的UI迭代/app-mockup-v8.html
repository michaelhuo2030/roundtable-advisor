<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>参谋 · Roundtable v8</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,'PingFang SC',sans-serif;color:#f0f0f0}
:root{--muted:#6a6a6a}

/* ════════════════════════════════════════════════════════
   HOME - Packages → Projects → Rounds
════════════════════════════════════════════════════════ */
#home{position:fixed;inset:0;background:#000;z-index:200;display:flex;flex-direction:column;align-items:center;padding:40px 20px;overflow-y:auto}

.hheader{text-align:center;margin-bottom:40px}
.hlogo{font-size:52px;font-weight:700;letter-spacing:12px;margin-bottom:10px}
.hsub{font-size:15px;color:var(--muted);letter-spacing:2px}

/* Packages */
.packages-container{width:100%;max-width:900px}
.package-section{margin-bottom:30px}
.package-title{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.1)}
.package-icon{font-size:20px}
.package-name{font-size:18px;font-weight:600}
.package-desc{font-size:12px;color:var(--muted);margin-left:auto}

/* Projects Grid */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.project-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;position:relative}
.project-card:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.05)}
.project-card.active{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.08)}
.project-card.new{border-style:dashed;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.35);min-height:100px}
.project-card.new:hover{color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.4)}

.project-name{font-size:14px;font-weight:600;margin-bottom:6px}
.project-meta{font-size:11px;color:var(--muted);line-height:1.5}
.project-rounds{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)}
.round-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);position:relative}
.round-dot.completed{background:rgba(255,255,255,.5)}
.round-dot.active{background:#fff;box-shadow:0 0 8px rgba(255,255,255,.5)}
.round-dot:hover::after{content:attr(data-round);position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,.7);white-space:nowrap;background:rgba(0,0,0,.9);padding:3px 6px;border-radius:4px}

.project-status{position:absolute;top:12px;right:12px;font-size:10px;padding:3px 8px;border-radius:10px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5)}
.project-status.active{background:rgba(100,200,100,.15);color:rgba(100,220,100,.9)}

/* New Round Button */
.new-round-btn{width:100%;max-width:900px;margin-top:20px;padding:14px;background:transparent;border:1px dashed rgba(255,255,255,.2);border-radius:10px;color:rgba(255,255,255,.4);font-size:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.new-round-btn:hover{border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.7)}

/* Enter Button */
.enter-bar{position:fixed;bottom:0;left:0;right:0;padding:20px;background:linear-gradient(transparent,rgba(0,0,0,.9));display:flex;justify-content:center}
.enter-btn{padding:12px 50px;background:#fff;color:#000;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;opacity:.4;pointer-events:none}
.enter-btn.active{opacity:1;pointer-events:all}
.enter-btn.active:hover{transform:scale(1.02);background:#f0f0f0}

/* Round Detail Modal */
.round-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.round-modal.show{display:flex}
.round-modal-box{background:rgba(15,15,15,.98);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:24px;width:420px;max-width:90%}
.round-modal-title{font-size:18px;font-weight:600;margin-bottom:6px}
.round-modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.rounds-list{max-height:300px;overflow-y:auto}
.round-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:6px}
.round-item:hover{background:rgba(255,255,255,.05)}
.round-item.active{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)}
.round-num{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.round-item.active .round-num{background:#fff;color:#000}
.round-info{flex:1}
.round-date{font-size:11px;color:var(--muted)}
.round-status{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.08)}
.round-status.ongoing{background:rgba(100,200,100,.15);color:rgba(100,220,100,.9)}
.round-status.completed{color:rgba(255,255,255,.5)}
.round-actions{display:flex;gap:10px;margin-top:20px}
.round-actions button{flex:1;padding:10px;border-radius:6px;border:none;font-size:13px;cursor:pointer}
.btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5)}
.btn-continue{background:#fff;color:#000;font-weight:500}

/* New Project Modal */
.new-project-modal .form-group{margin-bottom:16px}
.new-project-modal label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
.new-project-modal input,.new-project-modal select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:10px 12px;color:#fff;font-size:14px;outline:none}
.new-project-modal input:focus,.new-project-modal select:focus{border-color:rgba(255,255,255,.35)}

/* ════════════════════════════════════════════════════════
   MAIN APP
════════════════════════════════════════════════════════ */
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════
     HOME - Package → Project → Round
═══════════════════════════════════════════════════════════ -->
<div id="home">
  <div class="hheader">
    <div class="hlogo">参谋</div>
    <div class="hsub">十二位智者，照亮你的盲区</div>
  </div>
  
  <div class="packages-container" id="packages-container">
    <!-- Generated by JS -->
  </div>
  
  <div class="enter-bar">
    <button class="enter-btn" id="enter-btn" onclick="enterSession()">选择议题进入 →</button>
  </div>
</div>

<!-- Round Selection Modal -->
<div class="round-modal" id="round-modal" onclick="if(event.target===this)closeRoundModal()">
  <div class="round-modal-box">
    <div class="round-modal-title" id="modal-project-name">要不要全职创业？</div>
    <div class="round-modal-sub">选择要查看或继续的迭代轮次</div>
    <div class="rounds-list" id="rounds-list">
      <!-- Generated by JS -->
    </div>
    <div class="round-actions">
      <button class="btn-cancel" onclick="closeRoundModal()">取消</button>
      <button class="btn-continue" id="modal-continue-btn" onclick="confirmRound()" disabled>继续</button>
    </div>
  </div>
</div>

<!-- New Project Modal -->
<div class="round-modal" id="new-project-modal" onclick="if(event.target===this)closeNewProjectModal()">
  <div class="round-modal-box new-project-modal">
    <div class="round-modal-title">创建新议题</div>
    <div class="round-modal-sub">定义一个新的决策议题</div>
    
    <div class="form-group">
      <label>所属决策包</label>
      <select id="new-project-package">
        <option value="创业决策">🚀 创业决策</option>
        <option value="职业发展">💼 职业发展</option>
        <option value="人生决策">🌟 人生决策</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>议题名称</label>
      <input type="text" id="new-project-name" placeholder="例如：要不要接受这个offer？">
    </div>
    
    <div class="round-actions">
      <button class="btn-cancel" onclick="closeNewProjectModal()">取消</button>
      <button class="btn-continue" onclick="createNewProject()">创建并进入</button>
    </div>
  </div>
</div>
